# Access-tier rules for gbrain.
# Read by src/core/access-config.ts on startup.
# Each tier defines allow_tags (whitelist) + block_tags (blacklist).
# Visibility logic:
#   - A tier with empty allow_tags = default-allow (sees everything not blocked).
#   - A tier with populated allow_tags = only sees pages with at least one allow tag.
#   - Any matching block tag = page is hidden (blocks win over allows).
#   - `sensitivity:public` overrides normal rules (all tiers see it).
#   - `sensitivity:owner-only` visible only to `full`.
#   - Untagged pages visible only to `full` (default-deny to motivate migration).
#
# Overlay support:
#   Tiers like `work_scoped` intentionally ship with empty allow_tags here.
#   Concrete product-to-scope bindings (e.g. scope:jaci-bela) live in a private
#   overlay YAML passed as a second arg to loadAccessConfig (or via the
#   $ACCESS_TIERS_OVERLAY_PATH env var). The overlay can only *extend*
#   allow_tags/block_tags of existing tiers — it cannot define new tiers.
#   This keeps product-specific partner names out of the public gbrain repo.

version: 1

tiers:
  full:
    description: "Owner + fully-trusted partners. Sees everything except sensitivity:owner-only."
    allow_tags: []
    block_tags:
      - "sensitivity:owner-only"

  family:
    description: "Family-tier members. Family + personal domains, plus dads-house-sale scope."
    allow_tags:
      - "domain:family"
      - "domain:personal"
      - "scope:dads-house-sale"
      - "sensitivity:public"
    block_tags:
      - "domain:finance"
      - "domain:health"
      - "domain:identity"
      - "domain:work"
      - "scope:x-energy"
      - "scope:jaci-bela"
      - "scope:landscaping-saas"
      - "scope:idearanker"
      - "sensitivity:owner-only"

  work_scoped:
    description: "Scoped work-tier partner. allow_tags intentionally empty; concrete scope bindings live in the private overlay file (see header comment)."
    allow_tags:
      - "sensitivity:public"
    block_tags:
      - "sensitivity:owner-only"

  none:
    description: "Default-deny for unlisted identities."
    allow_tags: []
    block_tags:
      - "*"
